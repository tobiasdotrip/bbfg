name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux
    uses: ./.github/workflows/linux.yml
    with:
      upload-artifacts: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read

  windows:
    name: Windows
    uses: ./.github/workflows/windows.yml
    with:
      upload-artifacts: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read

  arm:
    name: ARM
    uses: ./.github/workflows/arm.yml
    with:
      upload-artifacts: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read

  release:
    name: Release ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, arm]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-input

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find release-input -type f \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          (cd release && sha256sum -c ./*.sha256)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --verify-tag \
              --generate-notes \
              --title "bbfg $GITHUB_REF_NAME"
          fi
